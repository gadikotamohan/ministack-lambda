name: Deploy Kubectl Lambda to MiniStack

on: [push]

jobs:
  deploy:
    runs-on: ubuntu-latest
    services:
      ministack:
        image: nahuelnucera/ministack
        ports:
          - 4566:4566
        env:
          LOG_LEVEL: INFO

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.0"

      - name: Download and Verify kubectl
        run: |
          KUBECTL_VERSION=$(curl -L -s https://dl.k8s.io/release/stable.txt)
          echo "Downloading kubectl version ${KUBECTL_VERSION}"
          
          # Download binary
          curl -LO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          
          # Download checksum
          curl -LO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl.sha256"
          
          # Verify checksum
          echo "$(cat kubectl.sha256)  kubectl" | sha256sum --check
          
          chmod +x kubectl

      - name: Package Lambda function
        run: |
          zip lambda_function_payload.zip handler.py kubectl

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Test Lambda Function URL
        run: |
          URL=$(terraform output -raw function_url)
          echo "Testing Lambda URL: $URL"
          # Wait for MiniStack and Lambda to be ready
          for i in {1..5}; do
            RESPONSE=$(curl -s "$URL")
            echo "Attempt $i: $RESPONSE"
            # Check if response is not null and not the empty Message null
            if [ -n "$RESPONSE" ] && [ "$RESPONSE" != '{"Message":null}' ] && [ "$RESPONSE" != '{"Message": null}' ]; then
              echo "$RESPONSE" | jq .
              exit 0
            fi
            sleep 10
          done
          echo "Lambda failed to return version in time or returned null"
          exit 1
