name: Deploy Kubectl Lambda to MiniStack

on: [push]

jobs:
  deploy:
    runs-on: ubuntu-latest
    services:
      ministack:
        image: nahuelnucera/ministack
        ports:
          - 4566:4566
        env:
          LOG_LEVEL: INFO

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.0"

      - name: Download and Verify kubectl
        run: |
          KUBECTL_VERSION=$(curl -L -s https://dl.k8s.io/release/stable.txt)
          echo "Downloading kubectl version ${KUBECTL_VERSION}"
          
          # Download binary
          curl -LO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          
          # Download checksum
          curl -LO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl.sha256"
          
          # Verify checksum
          echo "$(cat kubectl.sha256)  kubectl" | sha256sum --check
          
          chmod +x kubectl

      - name: Package Lambda function
        run: |
          zip lambda_function_payload.zip handler.py kubectl

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Diagnostics and Test
        run: |
          export AWS_ACCESS_KEY_ID=test
          export AWS_SECRET_ACCESS_KEY=test
          export AWS_DEFAULT_REGION=us-east-1
          
          echo "Listing Lambda Functions..."
          aws --endpoint-url=http://localhost:4566 lambda list-functions
          
          echo "Invoking Lambda via CLI..."
          aws --endpoint-url=http://localhost:4566 lambda invoke --function-name kubectl-version-lambda response.json
          cat response.json
          
          URL=$(terraform output -raw function_url)
          echo "Testing Lambda URL: $URL"
          
          # Try calling the URL directly (might fail if host not recognized)
          # And try calling localhost:4566 with the correct Host header if needed,
          # but usually these emulators expect us to call localhost:4566 directly for the URL if they don't do DNS magic.
          
          # Extract the ID from the URL: https://<id>.lambda-url.us-east-1.on.aws/
          URL_ID=$(echo "$URL" | grep -oE '[a-z0-9-]+\.lambda-url' | cut -d. -f1)
          echo "URL ID: $URL_ID"
          
          for i in {1..5}; do
            echo "Attempt $i..."
            # Try both the original URL and a localhost-mapped one
            # LocalStack/MiniStack often map <id>.lambda-url.localhost.localstack.cloud:4566 or similar
            RESPONSE=$(curl -s "$URL")
            echo "Direct URL Response: $RESPONSE"
            
            # Alternative: call localhost:4566 and let MiniStack route it
            # Some emulators use the Host header to route Function URLs
            HOST_RESPONSE=$(curl -s -H "Host: $URL_ID.lambda-url.us-east-1.on.aws" http://localhost:4566)
            echo "Host Header Response: $HOST_RESPONSE"
            
            if [[ "$RESPONSE" != '{"Message":null}' && "$RESPONSE" != "" ]]; then
               echo "$RESPONSE" | jq .
               exit 0
            fi
            if [[ "$HOST_RESPONSE" != '{"Message":null}' && "$HOST_RESPONSE" != "" ]]; then
               echo "$HOST_RESPONSE" | jq .
               exit 0
            fi
            sleep 10
          done
          exit 1
