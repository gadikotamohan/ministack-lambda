name: Deploy Kubectl Lambda to MiniStack

on: [push]

jobs:
  deploy:
    runs-on: ubuntu-latest
    services:
      ministack:
        image: nahuelnucera/ministack
        ports:
          - 4566:4566
        env:
          LOG_LEVEL: INFO

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.0"

      - name: Download and Verify kubectl
        run: |
          KUBECTL_VERSION=$(curl -L -s https://dl.k8s.io/release/stable.txt)
          echo "Downloading kubectl version ${KUBECTL_VERSION}"
          
          # Download binary
          curl -LO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          
          # Download checksum
          curl -LO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl.sha256"
          
          # Verify checksum
          echo "$(cat kubectl.sha256)  kubectl" | sha256sum --check
          
          chmod +x kubectl

      - name: Package Lambda function
        run: |
          zip lambda_function_payload.zip handler.py kubectl

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Diagnostics and Test
        run: |
          export AWS_ACCESS_KEY_ID=test
          export AWS_SECRET_ACCESS_KEY=test
          export AWS_DEFAULT_REGION=us-east-1
          
          echo "Listing Lambda Functions..."
          aws --endpoint-url=http://localhost:4566 lambda list-functions
          
          echo "Inspecting Function URL Config..."
          aws --endpoint-url=http://localhost:4566 lambda get-function-url-config --function-name kubectl-version-lambda || echo "URL config not found via CLI"
          
          echo "Invoking Lambda via CLI..."
          aws --endpoint-url=http://localhost:4566 lambda invoke --function-name kubectl-version-lambda response.json
          cat response.json | jq .
          
          URL=$(terraform output -raw function_url)
          echo "Terraform-provided URL: $URL"
          
          URL_ID=$(echo "$URL" | grep -oE '[a-z0-9-]+\.lambda-url' | cut -d. -f1)
          echo "Extracted URL ID: $URL_ID"
          
          # We will try multiple Host header formats that MiniStack might expect
          FORMATS=(
            "$URL_ID.lambda-url.us-east-1.on.aws"
            "$URL_ID.lambda-url.localhost"
            "$URL_ID.lambda-url.us-east-1.localhost"
            "kubectl-version-lambda.lambda-url.localhost"
          )
          
          for i in {1..5}; do
            echo "Attempt $i..."
            for HOST in "${FORMATS[@]}"; do
              echo "Testing Host: $HOST"
              RESPONSE=$(curl -s -H "Host: $HOST" http://localhost:4566)
              echo "Response for $HOST: $RESPONSE"
              
              # Check if response looks like the expected JSON (starts with { and contains clientVersion)
              if [[ "$RESPONSE" == *"clientVersion"* ]]; then
                 echo "Success with Host: $HOST"
                 echo "$RESPONSE" | jq .
                 exit 0
              fi
            done
            sleep 10
          done
          echo "Failed to find a working Host header for Function URL"
          exit 1
